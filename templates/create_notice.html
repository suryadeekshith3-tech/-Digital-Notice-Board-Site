{% extends "layout.html" %}

{% block content %}
<h2>Create Notice</h2>

<form action="{{ url_for('create_notice') }}" method="post" enctype="multipart/form-data">
  <div class="mb-3">
    <label for="title" class="form-label">Title</label>
    <input type="text" id="title" name="title" class="form-control" required />
  </div>

  <div class="mb-3">
    <label for="content" class="form-label">Content</label>
    <textarea id="content" name="content" class="form-control" rows="5" required></textarea>
  </div>

  <div class="mb-3">
  <label for="department" class="form-label">Department</label>
  <select id="department" name="department" class="form-select" required>
    <option value="" {% if not department %}selected{% endif %}>
      Select Department
    </option>
    <option value="all"
            {% if department == 'all' %}selected{% endif %}>
      All
    </option>
    <option value="cse"  {% if department == 'cse' %}selected{% endif %}>CSE</option>
    <option value="ece"  {% if department == 'ece' %}selected{% endif %}>ECE</option>
    <option value="mech" {% if department == 'mech' %}selected{% endif %}>Mechanical</option>
    <option value="civil"{% if department == 'civil'%}selected{% endif %}>Civil</option>
  </select>
</div>

  <div class="mb-3">
    <label class="form-label">Display style</label>
    <select name="display_type" class="form-select" required>
      <option value="card">Latest Notices (big card)</option>
      <option value="announcement">Announcements (3-column)</option>
    </select>
  </div>

  <div class="mb-3">
    <label for="media" class="form-label">Attach media (optional)</label>
    <input type="file" id="media" name="media" class="form-control" accept="audio/*,video/*,image/*" />
  </div>

  <div class="mb-3 form-check">
    <input type="checkbox" id="pinned" name="pinned" class="form-check-input" />
    <label for="pinned" class="form-check-label">Pin this notice</label>
  </div>

  <button type="submit" class="btn btn-primary">Create Notice</button>
  <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
</form>
<!-- Add this to your create notice form -->
<div class="mb-3">
  <label class="form-label">Notice Priority</label>
  <select name="urgency" class="form-select">
    <option value="normal">Normal</option>
    <option value="urgent">🔴 Urgent (Send SMS to all users)</option>
  </select>
</div>
{% endblock %}
