
{% block content %}
<div class="login-page-bg">
  <div class="login-wrapper">
    <div class="login-left">
      <h1>Welcome to website</h1>
      <p>Log in to access your college digital notice board and stay updated with the latest announcements.</p>
    </div>

    <div class="login-right">
      <h3>USER LOGIN</h3>
      <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
    <input type="email" name="email" placeholder="Email" required>
  </div>
  <div class="form-group">
    <input type="password" name="password" placeholder="Password" required>
  </div>
        <div class="options-row">
          <label><input type="checkbox" name="remember"> Remember</label>
          <a href="#" style="color:#888; text-decoration:none;">Forgot password?</a>
        </div>
        <button type="submit" class="login-btn">Login</button>
      </form>
    </div>
  </div>
</div>

<style>
  .login-page-bg{
    min-height: calc(100vh - 120px); /* adjust for your header height */
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#6a11cb,#ff6a00);
  }
  .login-wrapper{
    width:900px;
    height:500px;
    background:#fff;
    display:flex;
    border-radius:8px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
  }
  .login-left{
    flex:1;
    padding:60px 50px;
    background:linear-gradient(135deg,#6a11cb,#ff6a00);
    color:#fff;
  }
  .login-left h1{font-size:36px;margin-bottom:20px;}
  .login-left p{max-width:320px;line-height:1.6;opacity:0.9;}

  .login-right{
    flex:1;
    padding:60px 70px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    background:#ffffff;
  }
  .login-right h3{
    margin-bottom:30px;
    font-size:20px;
    color:#555;
    letter-spacing:1px;
  }
  .form-group{margin-bottom:18px;}
  .form-group input{
    width:100%;
    padding:12px 14px;
    border-radius:30px;
    border:1px solid #e0e0e0;
    background:#f8f8ff;
    font-size:14px;
  }
  .form-group input:focus{
    outline:none;
    border-color:#6a11cb;
  }
  .options-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:12px;
    color:#888;
    margin-bottom:20px;
  }
  .login-btn{
    border:none;
    width:130px;
    padding:12px 0;
    border-radius:30px;
    cursor:pointer;
    background:linear-gradient(135deg,#6a11cb,#ff6a00);
    color:#fff;
    font-size:14px;
    letter-spacing:1px;
    text-transform:uppercase;
  }
</style>
{% endblock %}
